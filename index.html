<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Salon Nordic — Kampaamo Helsinki</title>
    <meta
      name="description"
      content="Salon Nordic — pohjoismaista tyylikkyyttä Helsingin sydämessä. Leikkaukset, värjäykset, balayage ja juhlakampaukset. Varaa aika verkossa."
    />
    <!--
      GitHub Pages SPA deep-link fix (see public/404.html). When 404.html
      redirects here after a hard refresh on a route like /palvelut, it
      encodes the original path in the query string as ?/palvelut. This
      decodes it back into a real history entry before React Router mounts.
    -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded.shift() + (decoded.length ? "?" + decoded.join("&") : "") + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
